<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepWhale · Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: #070b12;
  color: #e2e8f0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}
body::before {
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 100% 60% at 50% -20%, rgba(59,130,246,0.12), transparent),
    radial-gradient(ellipse 70% 50% at 80% 90%, rgba(139,92,246,0.08), transparent),
    radial-gradient(ellipse 60% 40% at 20% 70%, rgba(16,185,129,0.05), transparent);
  pointer-events:none;
  z-index:0;
}
body::after {
  content:'';
  position:fixed;
  inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0;
}
.bg-grid {
  position:fixed;
  inset:0;
  background-image:linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
  z-index:0;
}
.login-container {
  position:relative;
  z-index:1;
  width:420px;
  animation:fadeUp .7s cubic-bezier(0.16,1,0.3,1);
}
@keyframes fadeUp { from { opacity:0; transform:translateY(24px) scale(0.98); } to { opacity:1; transform:translateY(0) scale(1); } }
.card {
  position:relative;
  background:linear-gradient(160deg, rgba(20,28,45,0.94), rgba(15,22,36,0.88));
  backdrop-filter:blur(60px);
  -webkit-backdrop-filter:blur(60px);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:24px;
  padding:44px 40px 36px;
  box-shadow:0 32px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset, 0 0 80px rgba(59,130,246,0.03);
  transition:box-shadow .5s, border-color .5s;
  overflow:hidden;
}
.card::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height:1px;
  background:linear-gradient(90deg, transparent, rgba(59,130,246,0.3), rgba(139,92,246,0.3), transparent);
  opacity:0;
  transition:opacity .5s;
}
.card:hover::before { opacity:1; }
.card:hover {
  box-shadow:0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05) inset, 0 0 120px rgba(59,130,246,0.05);
  border-color:rgba(255,255,255,0.08);
}
.logo {
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:6px;
}
.logo-icon {
  width:44px; height:44px;
  background:linear-gradient(135deg, #3b82f6, #8b5cf6);
  border-radius:13px;
  display:flex; align-items:center; justify-content:center;
  font-size:22px;
  box-shadow:0 8px 24px rgba(59,130,246,0.3);
  flex-shrink:0;
  transition:transform .3s ease, box-shadow .3s ease;
}
.logo:hover .logo-icon { transform:scale(1.05) rotate(-2deg); box-shadow:0 12px 32px rgba(59,130,246,0.4); }
.logo-text h1 { font-size:22px; font-weight:700; letter-spacing:-0.3px; background:linear-gradient(135deg, #e2e8f0, #94a3b8); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.logo-text .sub { color:#64748b; font-size:13px; margin-top:1px; }
.divider { height:1px; background:linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent); margin:22px 0 24px; }
.input-group { margin-bottom:18px; }
.input-group label {
  display:block;
  font-size:11px;
  font-weight:600;
  margin-bottom:6px;
  color:#94a3b8;
  text-transform:uppercase;
  letter-spacing:0.6px;
}
.input-group input {
  width:100%;
  padding:14px 16px;
  background:rgba(7,11,18,0.5);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:12px;
  color:#e2e8f0;
  font-size:15px;
  font-family:'Inter', sans-serif;
  outline:none;
  transition:all .3s;
}
.input-group input::placeholder { color:#3f4a5e; }
.input-group input:focus {
  border-color:rgba(59,130,246,0.4);
  box-shadow:0 0 0 3px rgba(59,130,246,0.08), 0 0 0 1px rgba(59,130,246,0.2), 0 4px 16px rgba(59,130,246,0.06);
  background:rgba(7,11,18,0.7);
}
.btn-primary {
  position:relative;
  width:100%;
  padding:14px;
  background:linear-gradient(135deg, #3b82f6, #2563eb);
  border:none;
  border-radius:12px;
  color:#fff;
  font-size:15px;
  font-weight:600;
  font-family:'Inter', sans-serif;
  cursor:pointer;
  transition:all .3s;
  overflow:hidden;
}
.btn-primary::before {
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, transparent, rgba(255,255,255,0.08));
  opacity:0;
  transition:opacity .3s;
}
.btn-primary:hover::before { opacity:1; }
.btn-primary:hover {
  transform:translateY(-2px);
  box-shadow:0 12px 32px rgba(59,130,246,0.35);
}
.btn-primary:active { transform:translateY(0); }
.error {
  display:none;
  background:rgba(239,68,68,0.08);
  border:1px solid rgba(239,68,68,0.15);
  color:#fca5a5;
  padding:12px 16px;
  border-radius:10px;
  font-size:13px;
  margin-bottom:18px;
  backdrop-filter:blur(8px);
  line-height:1.5;
  animation:shake .4s ease;
}
@keyframes shake {
  0%,100% { transform:translateX(0); }
  20% { transform:translateX(-6px); }
  40% { transform:translateX(6px); }
  60% { transform:translateX(-4px); }
  80% { transform:translateX(4px); }
}
.footer-text { text-align:center; margin-top:20px; font-size:11px; color:#3f4a5e; }
.btn-loading { pointer-events:none; opacity:0.7; }
.spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.2); border-top-color:#fff; border-radius:50%; animation:spin .6s linear; vertical-align:middle; margin-right:6px; }
@keyframes spin { to { transform:rotate(360deg); } }

.lang-switch {
  display:flex;
  gap:4px;
  justify-content:flex-end;
  margin-bottom:16px;
}
.lang-btn {
  padding:4px 12px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.06);
  background:rgba(255,255,255,0.03);
  color:#64748b;
  font-size:11px;
  font-weight:600;
  font-family:'Inter', sans-serif;
  cursor:pointer;
  transition:all .2s;
  text-transform:uppercase;
  letter-spacing:0.3px;
}
.lang-btn:hover { background:rgba(255,255,255,0.06); color:#94a3b8; }
.lang-btn.active { background:rgba(59,130,246,0.12); color:#93c5fd; border-color:rgba(59,130,246,0.2); }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="login-container">
<div class="card">
  <div class="lang-switch">
    <button class="lang-btn active" onclick="setLang('en')" data-lang="en">EN</button>
    <button class="lang-btn" onclick="setLang('vi')" data-lang="vi">VI</button>
  </div>
  <div class="logo">
    <div class="logo-icon">&#9670;</div>
    <div class="logo-text">
      <h1>DeepWhale</h1>
      <div class="sub" data-i18n="login.subtitle">Admin Portal</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="error" id="error"></div>
  <form id="loginForm" autocomplete="off">
    <div class="input-group">
      <label data-i18n="login.password">Admin Password</label>
      <input type="password" id="password" name="password" data-i18n-placeholder="login.placeholder" placeholder="&#9679; &#9679; &#9679; &#9679; &#9679; &#9679; &#9679; &#9679;" required autofocus>
    </div>
    <button type="submit" class="btn-primary" id="loginBtn"><span data-i18n="login.signin">Sign In</span></button>
  </form>
  <div class="footer-text">DeepWhale &middot; <span data-i18n="login.footer">OpenAI Compatible Bridge</span></div>
</div>
</div>
<script>
const i18n = {
  en: {
    'login.subtitle': 'Admin Portal',
    'login.password': 'Admin Password',
    'login.placeholder': '\u25CF \u25CF \u25CF \u25CF \u25CF \u25CF \u25CF \u25CF',
    'login.signin': 'Sign In',
    'login.signing': 'Signing in...',
    'login.footer': 'OpenAI Compatible Bridge',
    'login.invalid': 'Invalid password',
    'login.connection': 'Connection error',
  },
  vi: {
    'login.subtitle': 'C\u1ed5ng Qu\u1ea3n Tr\u1ecb',
    'login.password': 'M\u1eadt Kh\u1ea9u Qu\u1ea3n Tr\u1ecb',
    'login.placeholder': '\u25CF \u25CF \u25CF \u25CF \u25CF \u25CF \u25CF \u25CF',
    'login.signin': '\u0110\u0103ng Nh\u1eadp',
    'login.signing': '\u0110ang \u0111\u0103ng nh\u1eadp...',
    'login.footer': 'C\u1ea7u N\u1ed1i T\u01b0\u01a1ng Th\u00edch OpenAI',
    'login.invalid': 'M\u1eadt kh\u1ea9u kh\u00f4ng \u0111\u00fang',
    'login.connection': 'L\u1ed7i k\u1ebft n\u1ed1i',
  }
};
let currentLang = localStorage.getItem('deepwhale_lang') || 'en';
function t(key) { return i18n[currentLang]?.[key] || i18n['en']?.[key] || key; }
function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === currentLang);
  });
  localStorage.setItem('deepwhale_lang', currentLang);
}
function setLang(lang) { currentLang = lang; applyTranslations(); }
applyTranslations();

const form = document.getElementById('loginForm');
const btn = document.getElementById('loginBtn');
const errEl = document.getElementById('error');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errEl.style.display = 'none';
  btn.innerHTML = '<span class="spinner"></span> ' + t('login.signing');
  btn.classList.add('btn-loading');
  try {
    const resp = await fetch('/admin/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ password: document.getElementById('password').value })
    });
    if (resp.ok) {
      btn.innerHTML = '<span>&#10003;</span> ' + t('login.signin');
      setTimeout(() => { window.location.href = '/admin/dashboard'; }, 300);
    } else {
      const data = await resp.json();
      errEl.textContent = data.error || t('login.invalid');
      errEl.style.display = 'block';
      btn.innerHTML = t('login.signin');
      btn.classList.remove('btn-loading');
      document.getElementById('password').focus();
    }
  } catch(e) {
    errEl.textContent = t('login.connection');
    errEl.style.display = 'block';
    btn.innerHTML = t('login.signin');
    btn.classList.remove('btn-loading');
  }
});
document.getElementById('password').addEventListener('keydown', function() {
  errEl.style.display = 'none';
});
</script>
</body>
</html>
